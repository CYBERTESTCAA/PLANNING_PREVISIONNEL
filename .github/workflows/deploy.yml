name: Deploy (Internal Server)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build frontend
        run: |
          npm install
          npm run build

      - name: Install & build API
        run: |
          npm install -w api
          npx -w api prisma generate
          npm run build -w api

      - name: Upload artifacts to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

          RELEASE_ID="${GITHUB_SHA}"
          RELEASE_DIR="$DEPLOY_PATH/releases/$RELEASE_ID"

          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$RELEASE_DIR' '$DEPLOY_PATH/shared' '$DEPLOY_PATH/releases'"

          rsync -az --delete -e "ssh -p ${SSH_PORT:-22}" dist/ "$SSH_USER@$SSH_HOST:$RELEASE_DIR/web/"

          rsync -az -e "ssh -p ${SSH_PORT:-22}" api/package.json "$SSH_USER@$SSH_HOST:$RELEASE_DIR/api/"
          rsync -az -e "ssh -p ${SSH_PORT:-22}" api/prisma "$SSH_USER@$SSH_HOST:$RELEASE_DIR/api/"
          rsync -az -e "ssh -p ${SSH_PORT:-22}" api/dist "$SSH_USER@$SSH_HOST:$RELEASE_DIR/api/"

      - name: Activate release & restart services
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          API_DATABASE_URL: ${{ secrets.API_DATABASE_URL }}
        run: |
          set -euo pipefail
          RELEASE_ID="${GITHUB_SHA}"
          RELEASE_DIR="$DEPLOY_PATH/releases/$RELEASE_ID"

          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "bash -lc '
            set -euo pipefail

            ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"

            if [ ! -f "$DEPLOY_PATH/shared/api.env" ]; then
              echo "DATABASE_URL=__CHANGE_ME__" > "$DEPLOY_PATH/shared/api.env"
            fi

            if [ -n "${API_DATABASE_URL:-}" ]; then
              sed -i "s#^DATABASE_URL=.*#DATABASE_URL=${API_DATABASE_URL}#" "$DEPLOY_PATH/shared/api.env"
            fi

            cd "$DEPLOY_PATH/current/api"
            npm install --omit=dev
            npx prisma generate
            npx prisma db push

            sudo systemctl restart planning-api.service

            sudo systemctl reload nginx || true

            ls -1dt "$DEPLOY_PATH/releases"/* | tail -n +31 | xargs -r rm -rf
          '"
