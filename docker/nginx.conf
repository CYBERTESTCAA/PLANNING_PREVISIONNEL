# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # ─── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Hide server version [ZAP 10036] ──────────────────────────────────────
    server_tokens off;

    # ─── Security headers ─────────────────────────────────────────────────────
    # HSTS [ZAP 10035]
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP [ZAP 10038] + Anti-clickjacking via frame-ancestors [ZAP 10020]
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://login.microsoftonline.com https://*.microsoft.com https://*.msauth.net; frame-src https://login.microsoftonline.com https://*.microsoft.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://login.microsoftonline.com;" always;

    # X-Content-Type-Options [ZAP 10021]
    add_header X-Content-Type-Options "nosniff" always;

    # X-Frame-Options (legacy fallback for frame-ancestors) [ZAP 10020]
    add_header X-Frame-Options "DENY" always;

    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy [ZAP 10063]
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # COOP — unsafe-none required for MSAL popup/redirect auth flow
    add_header Cross-Origin-Opener-Policy "unsafe-none" always;

    # COEP [ZAP 90004] — unsafe-none for MSAL compatibility
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Frontend SPA — HTML pages (no-cache so fresh deploys are instant) ────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # ─── Proxy API vers le conteneur backend ──────────────────────────────────
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend http://api:3001;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # No caching for API responses
        add_header Cache-Control "no-store" always;
    }

    # ─── Fingerprinted static assets — aggressive cache [ZAP 10015/10049] ─────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ─── Other static files (favicon, fonts, images) ─────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # ─── Disable access to hidden files ───────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
